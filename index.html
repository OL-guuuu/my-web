<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oussama Lassoued</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060608}
body{cursor:none;-webkit-font-smoothing:antialiased}
canvas#main{position:fixed;inset:0;z-index:1}

/* Cursor */
#cur{position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%)}
#cur-c{width:7px;height:7px;background:#e8e4dc;border-radius:50%;transition:transform .2s,opacity .2s}
#cur-ring{position:fixed;z-index:9998;width:32px;height:32px;border:1px solid rgba(232,228,220,.2);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:width .4s,height .4s,border-color .3s}
body.hov #cur-c{transform:scale(0)}
body.hov #cur-ring{width:50px;height:50px;border-color:rgba(232,228,220,.4)}
body.pressing #cur-c{transform:scale(1.6)}

/* Preloader */
#pre{
  position:fixed;inset:0;z-index:9990;background:#000;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0;
}
.pre-w{width:min(280px,75vw);padding:28px;border:1px solid rgba(255,255,255,.08)}
.pre-top{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.25em;color:rgba(255,255,255,.15);text-transform:uppercase;margin-bottom:18px}
.pre-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(24px,6vw,38px);color:#e8e4dc;letter-spacing:-.03em;line-height:1;margin-bottom:4px;overflow:hidden}
.pre-line{display:block;transform:translateY(110%)}
.pre-sub{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:22px}
.pre-prog{height:1px;background:rgba(255,255,255,.07);margin-bottom:8px}
.pre-fill{height:100%;background:#e8e4dc;width:0%}
.pre-foot{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,.18)}

/* Tooltip hints */
#hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:20;font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.18em;text-transform:uppercase;
  color:rgba(232,228,220,.2);
  display:flex;align-items:center;gap:14px;
  opacity:0;transition:opacity .5s;
  white-space:nowrap;
}
#hint span{color:rgba(232,228,220,.35)}

/* Button label tooltip */
#btn-tip{
  position:fixed;z-index:30;
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.14em;text-transform:uppercase;
  background:rgba(10,10,14,.92);
  color:rgba(232,228,220,.6);
  padding:6px 12px;
  border:1px solid rgba(232,228,220,.1);
  pointer-events:none;
  opacity:0;transition:opacity .2s;
  white-space:nowrap;
}

/* Nav bar top */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 36px;
  opacity:0;
}
.tb-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:rgba(232,228,220,.5);letter-spacing:-.02em}
.tb-links{display:flex;gap:18px;list-style:none}
.tb-links a{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,228,220,.22);text-decoration:none;cursor:none;transition:color .3s}
.tb-links a:hover{color:rgba(232,228,220,.6)}

@media(max-width:700px){
  .tb-links{display:none}
  #hint{font-size:8px;gap:8px}
}
</style>
</head>
<body>

<div id="cur"><div id="cur-c"></div></div>
<div id="cur-ring"></div>

<!-- MAIN 3D CANVAS -->
<canvas id="main"></canvas>

<!-- TOOLTIP -->
<div id="btn-tip"></div>

<!-- PRELOADER -->
<div id="pre">
  <div class="pre-w">
    <div class="pre-top">// boot sequence</div>
    <div class="pre-title">
      <span class="pre-line" id="pl1">Oussama</span>
      <span class="pre-line" id="pl2">Lassoued.</span>
    </div>
    <div class="pre-sub">UX / UI Designer · 2026</div>
    <div class="pre-prog"><div class="pre-fill" id="pf"></div></div>
    <div class="pre-foot">
      <span id="plbl">Powering on...</span>
      <span id="pnum">000</span>
    </div>
  </div>
</div>

<!-- TOP NAV -->
<div id="topbar">
  <div class="tb-logo">OL.</div>
  <ul class="tb-links">
    <li><a href="#" onclick="navigate('about');return false">About</a></li>
    <li><a href="#" onclick="navigate('work');return false">Work</a></li>
    <li><a href="#" onclick="navigate('services');return false">Services</a></li>
    <li><a href="#" onclick="navigate('reviews');return false">Reviews</a></li>
    <li><a href="#" onclick="navigate('contact');return false">Contact</a></li>
    <li><a href="https://www.linkedin.com/in/oussama-lassoued-in/" target="_blank">LinkedIn ↗</a></li>
    <li><a href="https://drive.google.com/file/d/1MZP5ccqr-adGogf5fUzMLNicwh738o_O/view" target="_blank">Resume ↗</a></li>
  </ul>
</div>

<!-- HINT -->
<div id="hint">
  <span>↑ ↓</span> Navigate &nbsp;|&nbsp; <span>OK</span> Select &nbsp;|&nbsp; <span>Scroll</span> Browse
</div>

<script>
/* ═══════════════════════════════════
   CURSOR
═══════════════════════════════════ */
const curEl=document.getElementById('cur');
const curRing=document.getElementById('cur-ring');
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curEl.style.left=mx+'px';curEl.style.top=my+'px'});
(function lr(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;curRing.style.left=rx+'px';curRing.style.top=ry+'px';requestAnimationFrame(lr)})();

/* ═══════════════════════════════════
   SCREEN DATA
═══════════════════════════════════ */
const SCREENS={
  home:{
    title:'HOME',
    menu:['About Me','My Projects','Services','Reviews','Contact'],
    selectedIdx:0
  },
  about:{title:'ABOUT ME'},
  work:{title:'PROJECTS'},
  services:{title:'SERVICES'},
  reviews:{title:'REVIEWS'},
  contact:{title:'CONTACT'}
};

let currentScreen='home';
let menuIdx=0;
let screenAnim=0; // 0=idle,1=transitioning

/* ═══════════════════════════════════
   THREE.JS SCENE
═══════════════════════════════════ */
const canvas=document.getElementById('main');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;
renderer.setClearColor(0x060608);

const scene=new THREE.Scene();
// Subtle fog
scene.fog=new THREE.FogExp2(0x060608,.032);

const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.1,100);
camera.position.set(0,.3,10.5);

/* ── LIGHTS ── */
scene.add(new THREE.AmbientLight(0xffffff,.08));

const keyL=new THREE.DirectionalLight(0xffffff,2.2);
keyL.position.set(5,8,7);
keyL.castShadow=true;
keyL.shadow.mapSize.setScalar(2048);
keyL.shadow.camera.near=.1;keyL.shadow.camera.far=30;
keyL.shadow.camera.left=-6;keyL.shadow.camera.right=6;
keyL.shadow.camera.top=8;keyL.shadow.camera.bottom=-8;
keyL.shadow.radius=6;
scene.add(keyL);

const fillL=new THREE.DirectionalLight(0x8090c0,.22);
fillL.position.set(-6,-3,5);scene.add(fillL);

const rimL=new THREE.DirectionalLight(0xc0d0ff,1.1);
rimL.position.set(-3,5,-7);scene.add(rimL);

const rimL2=new THREE.DirectionalLight(0xffffff,.5);
rimL2.position.set(6,-4,-5);scene.add(rimL2);

// Screen glow light
const screenLight=new THREE.PointLight(0xaaccee,1.2,4.5);
screenLight.position.set(0,.5,3.5);scene.add(screenLight);

// Subtle back environment
const envGeo=new THREE.SphereGeometry(40,32,32);
const envMat=new THREE.MeshBasicMaterial({color:0x090a10,side:THREE.BackSide});
scene.add(new THREE.Mesh(envGeo,envMat));

/* ── PHONE GROUP ── */
const phoneGroup=new THREE.Group();
scene.add(phoneGroup);

/* ── MATERIALS ── */
const M={
  body:      new THREE.MeshStandardMaterial({color:0x1c1c22,roughness:.15,metalness:.82,envMapIntensity:1}),
  bodyMid:   new THREE.MeshStandardMaterial({color:0x232330,roughness:.18,metalness:.75}),
  dark:      new THREE.MeshStandardMaterial({color:0x0d0d12,roughness:.1,metalness:.9}),
  btn:       new THREE.MeshStandardMaterial({color:0x262630,roughness:.2,metalness:.7}),
  btnDark:   new THREE.MeshStandardMaterial({color:0x101015,roughness:.12,metalness:.88}),
  accent:    new THREE.MeshStandardMaterial({color:0x35354a,roughness:.3,metalness:.5}),
  navRing:   new THREE.MeshStandardMaterial({color:0x2a2a38,roughness:.12,metalness:.85}),
  navCenter: new THREE.MeshStandardMaterial({color:0x151518,roughness:.08,metalness:.95}),
  keyWhite:  new THREE.MeshStandardMaterial({color:0xd8d4cc,roughness:.25,metalness:.05}),
  softKey:   new THREE.MeshStandardMaterial({color:0x1e1e28,roughness:.2,metalness:.78}),
  chrome:    new THREE.MeshStandardMaterial({color:0x606070,roughness:.05,metalness:.98}),
};

/* ── ROUNDED RECT SHAPE ── */
function roundRect(w,h,r){
  const s=new THREE.Shape();
  s.moveTo(-w/2+r,-h/2);
  s.lineTo(w/2-r,-h/2);s.quadraticCurveTo(w/2,-h/2,w/2,-h/2+r);
  s.lineTo(w/2,h/2-r);s.quadraticCurveTo(w/2,h/2,w/2-r,h/2);
  s.lineTo(-w/2+r,h/2);s.quadraticCurveTo(-w/2,h/2,-w/2,h/2-r);
  s.lineTo(-w/2,-h/2+r);s.quadraticCurveTo(-w/2,-h/2,-w/2+r,-h/2);
  return s;
}

function extrude(shape,depth,bevel=0,bSeg=4){
  return new THREE.ExtrudeGeometry(shape,{
    depth,bevelEnabled:bevel>0,
    bevelThickness:bevel,bevelSize:bevel,bevelSegments:bSeg
  });
}

/* ═══════════════════════════════════
   PHONE BODY
═══════════════════════════════════ */
// Main body — tall rounded rectangle
const bodyShape=roundRect(2.4,5.2,.35);
const bodyGeo=extrude(bodyShape,.52,.06,6);
bodyGeo.center();
const bodyMesh=new THREE.Mesh(bodyGeo,M.body);
bodyMesh.castShadow=true;bodyMesh.receiveShadow=true;
phoneGroup.add(bodyMesh);

// Slight chamfer edge highlight
const chamferGeo=extrude(roundRect(2.38,5.18,.34),.01,.0);
chamferGeo.center();
const chamfer=new THREE.Mesh(chamferGeo,M.chrome);
chamfer.position.z=.25;
phoneGroup.add(chamfer);

// Top cap (rounded, slightly different color)
const topCapGeo=extrude(roundRect(2.28,.65,.18),.06,.01,3);
topCapGeo.center();
const topCap=new THREE.Mesh(topCapGeo,M.bodyMid);
topCap.position.set(0,2.2,.26);
phoneGroup.add(topCap);

/* ═══════════════════════════════════
   EARPIECE
═══════════════════════════════════ */
const earGeo=extrude(roundRect(.65,.07,.03),.03,.0);earGeo.center();
const ear=new THREE.Mesh(earGeo,M.dark);
ear.position.set(0,2.22,.31);phoneGroup.add(ear);
// mesh holes
for(let i=-2;i<=2;i++){
  const hg=new THREE.CylinderGeometry(.014,.014,.06,6);
  const h=new THREE.Mesh(hg,M.dark);
  h.rotation.z=Math.PI/2;h.position.set(i*.1,2.22,.34);phoneGroup.add(h);
}

/* ═══════════════════════════════════
   CAMERA HOLE (top)
═══════════════════════════════════ */
const camGeo=new THREE.CylinderGeometry(.055,.055,.04,32);
const camMesh=new THREE.Mesh(camGeo,M.dark);
camMesh.rotation.x=Math.PI/2;camMesh.position.set(.6,2.26,.32);phoneGroup.add(camMesh);
// lens ring
const lensRingGeo=new THREE.TorusGeometry(.055,.01,8,24);
const lensRing=new THREE.Mesh(lensRingGeo,M.chrome);
lensRing.position.set(.6,2.26,.33);phoneGroup.add(lensRing);

/* ═══════════════════════════════════
   SCREEN AREA
═══════════════════════════════════ */
// Screen bezel frame
const bezelShape=roundRect(2.0,1.8,.08);
const screenHole=new THREE.Path();
const sw=1.72,sh=1.56,sr=.04;
screenHole.moveTo(-sw/2+sr,-sh/2);
screenHole.lineTo(sw/2-sr,-sh/2);screenHole.quadraticCurveTo(sw/2,-sh/2,sw/2,-sh/2+sr);
screenHole.lineTo(sw/2,sh/2-sr);screenHole.quadraticCurveTo(sw/2,sh/2,sw/2-sr,sh/2);
screenHole.lineTo(-sw/2+sr,sh/2);screenHole.quadraticCurveTo(-sw/2,sh/2,-sw/2,sh/2-sr);
screenHole.lineTo(-sw/2,-sh/2+sr);screenHole.quadraticCurveTo(-sw/2,-sh/2,-sw/2+sr,-sh/2);
bezelShape.holes.push(screenHole);
const bezelGeo=extrude(bezelShape,.05,.0);bezelGeo.center();
const bezel=new THREE.Mesh(bezelGeo,M.dark);
bezel.position.set(0,1.1,.3);phoneGroup.add(bezel);

// Screen canvas
const SC=512,SH=420;
const sc=document.createElement('canvas');sc.width=SC;sc.height=SH;
const ctx=sc.getContext('2d');
const scTex=new THREE.CanvasTexture(sc);

const screenGeo=new THREE.PlaneGeometry(1.72,1.56);
const screenMat=new THREE.MeshStandardMaterial({
  map:scTex,roughness:.02,metalness:0,
  emissive:new THREE.Color(.04,.06,.12),emissiveIntensity:.8
});
const screenMesh=new THREE.Mesh(screenGeo,screenMat);
screenMesh.position.set(0,1.1,.315);
phoneGroup.add(screenMesh);

// Glass shine
const glassGeo=new THREE.PlaneGeometry(1.72,1.56);
const glassMat=new THREE.MeshStandardMaterial({transparent:true,opacity:.03,roughness:0,metalness:0,color:0xffffff});
const glassMesh=new THREE.Mesh(glassGeo,glassMat);
glassMesh.position.set(.15,1.25,.32);glassMesh.rotation.z=.05;phoneGroup.add(glassMesh);

/* ═══════════════════════════════════
   SEPARATOR LINE
═══════════════════════════════════ */
const sepGeo=new THREE.BoxGeometry(2.1,.025,.04);
const sep=new THREE.Mesh(sepGeo,M.btnDark);sep.position.set(0,.22,.3);phoneGroup.add(sep);
const sepG2=extrude(roundRect(2.1,.02,.0),.06,.0);sepG2.center();
const sep2=new THREE.Mesh(sepG2,M.chrome);sep2.position.set(0,.22,.28);phoneGroup.add(sep2);

/* ═══════════════════════════════════
   NAV DISC — central control
═══════════════════════════════════ */
// Outer ring with texture detail
const outerRingGeo=new THREE.TorusGeometry(.62,.13,32,100);
const outerRing=new THREE.Mesh(outerRingGeo,M.navRing);
outerRing.position.set(0,-.38,.29);phoneGroup.add(outerRing);

// Ring grip ridges
for(let i=0;i<20;i++){
  const a=i/20*Math.PI*2;
  const rg=new THREE.BoxGeometry(.025,.06,.02);
  const rm=new THREE.Mesh(rg,M.accent);
  rm.position.set(Math.cos(a)*.62,Math.sin(a)*.62+-.38,.32);
  rm.rotation.z=a;
  phoneGroup.add(rm);
}

// Inner disc
const innerGeo=new THREE.CylinderGeometry(.42,.42,.055,64);
const innerDisc=new THREE.Mesh(innerGeo,M.btn);
innerDisc.rotation.x=Math.PI/2;innerDisc.position.set(0,-.38,.29);phoneGroup.add(innerDisc);

// Center OK button — slightly raised
const okGeo=new THREE.CylinderGeometry(.16,.16,.07,48);
const okBtn=new THREE.Mesh(okGeo,M.navCenter);
okBtn.rotation.x=Math.PI/2;okBtn.position.set(0,-.38,.32);
okBtn.userData={type:'btn',action:'ok',label:'OK — Select'};
phoneGroup.add(okBtn);
// OK label
const okRingGeo=new THREE.TorusGeometry(.155,.008,8,32);
const okRing=new THREE.Mesh(okRingGeo,M.chrome);
okRing.position.set(0,-.38,.36);phoneGroup.add(okRing);

/* ── D-PAD DIRECTIONS ── */
const dPad=[
  {dir:'up',  pos:[0, .22,0],rot:0,   label:'↑ Previous'},
  {dir:'down',pos:[0,-.98,0],rot:Math.PI,label:'↓ Next'},
  {dir:'left',pos:[-.76,-.38,0],rot:-Math.PI/2,label:'← Back'},
  {dir:'right',pos:[.76,-.38,0],rot:Math.PI/2, label:'→ Forward'},
];
const dpMeshes=[];
dPad.forEach(d=>{
  const dg=new THREE.BoxGeometry(.18,.22,.04);
  const dm=new THREE.Mesh(dg,M.accent);
  dm.position.set(d.pos[0],d.pos[1]+-.38,d.pos[2]+.33);
  dm.userData={type:'btn',action:d.dir,label:d.label};
  phoneGroup.add(dm);
  dpMeshes.push(dm);

  // Arrow indicator
  const ag=new THREE.ConeGeometry(.04,.07,3);
  const am=new THREE.Mesh(ag,M.chrome);
  am.rotation.z=d.rot;
  am.position.set(d.pos[0],d.pos[1]+-.38,d.pos[2]+.36);
  phoneGroup.add(am);
});

/* ── SOFT KEYS (below disc) ── */
const softKeyData=[
  {x:-.72,label:'Menu'},
  {x:.72,label:'Back'},
];
const softKeyMeshes=[];
softKeyData.forEach(d=>{
  const sg=extrude(roundRect(.48,.17,.05),.05,.01,3);sg.center();
  const sm=new THREE.Mesh(sg,M.softKey);
  sm.position.set(d.x,-.98,.29);
  sm.userData={type:'btn',action:d.label.toLowerCase(),label:d.label};
  phoneGroup.add(sm);
  softKeyMeshes.push(sm);
});

/* ═══════════════════════════════════
   KEYPAD — 12 keys
═══════════════════════════════════ */
const keyLabels=[
  ['1','ABC','DEF'],
  ['GHI','JKL','MNO'],
  ['PQRS','TUV','WXYZ'],
  ['*','0','#']
];
const keyActions=[
  ['1','2','3'],
  ['4','5','6'],
  ['7','8','9'],
  ['star','0','hash']
];
const keyMeshes=[];
let keyRow=0;
for(let r=0;r<4;r++){
  for(let c=0;c<3;c++){
    const kg=extrude(roundRect(.5,.26,.06),.05,.012,4);kg.center();
    const km=new THREE.Mesh(kg,M.btn);
    km.position.set((c-1)*.6,-1.38-r*.35,.285);
    km.userData={
      type:'btn',
      action:'key_'+keyActions[r][c],
      label:keyActions[r][c]+' · '+keyLabels[r][c],
      row:r,col:c,origZ:.285
    };
    phoneGroup.add(km);
    keyMeshes.push(km);
  }
}

/* ═══════════════════════════════════
   SIDE BUTTONS
═══════════════════════════════════ */
[-1.24,1.24].forEach((x,i)=>{
  const sg=new THREE.BoxGeometry(.07,.38,.18);
  const sm=new THREE.Mesh(sg,M.accent);
  sm.position.set(x,.6,.0);phoneGroup.add(sm);
  // Rounded cap
  const cg=new THREE.BoxGeometry(.05,.22,.14);
  const cm=new THREE.Mesh(cg,M.accent);
  cm.position.set(x,-.3,.0);phoneGroup.add(cm);
});

/* ═══════════════════════════════════
   SPEAKER / DETAILS
═══════════════════════════════════ */
// Top speaker
for(let i=-2;i<=2;i++){
  const hg=new THREE.CylinderGeometry(.013,.013,.06,6);
  const hm=new THREE.Mesh(hg,M.btnDark);
  hm.rotation.x=Math.PI/2;hm.position.set(i*.08,2.28,.31);phoneGroup.add(hm);
}
// Bottom speaker grille
for(let i=-3;i<=3;i++){
  const hg=new THREE.CylinderGeometry(.012,.012,.04,6);
  const hm=new THREE.Mesh(hg,M.btnDark);
  hm.rotation.x=Math.PI/2;hm.position.set(i*.07,-2.42,.31);phoneGroup.add(hm);
}
// Bottom connector port
const portGeo=extrude(roundRect(.52,.08,.03),.03,.0);portGeo.center();
const portMesh=new THREE.Mesh(portGeo,M.dark);portMesh.position.set(0,-2.52,.3);phoneGroup.add(portMesh);
for(let i=-2;i<=2;i++){
  const pg=new THREE.BoxGeometry(.04,.04,.06);
  const pm=new THREE.Mesh(pg,M.chrome);pm.position.set(i*.08,-2.52,.3);phoneGroup.add(pm);
}

/* ═══════════════════════════════════
   SCREEN DRAWING SYSTEM
═══════════════════════════════════ */
// Colors
const C={
  bg:      '#06080f',
  bgCard:  'rgba(15,18,30,.95)',
  bgSel:   'rgba(200,210,240,.12)',
  border:  'rgba(200,210,240,.1)',
  status:  'rgba(200,210,240,.55)',
  title:   'rgba(220,225,240,.92)',
  body:    'rgba(180,188,210,.5)',
  muted:   'rgba(150,158,185,.3)',
  accent:  'rgba(200,215,255,.75)',
  white:   '#e8e6f0',
  dim:     'rgba(150,158,185,.18)',
};

let slideDir=1; // 1=down, -1=up
let slideAnim=null;
let pendingScreen=null;
let currentDrawn=null;

function fill(color,x,y,w,h){ctx.fillStyle=color;ctx.fillRect(x,y,w,h)}
function text(t,x,y,font,color,align='left'){
  ctx.font=font;ctx.fillStyle=color;ctx.textAlign=align;ctx.fillText(t,x,y);
  ctx.textAlign='left';
}
function roundFill(color,x,y,w,h,r){
  ctx.fillStyle=color;ctx.beginPath();
  ctx.roundRect?ctx.roundRect(x,y,w,h,r):ctx.rect(x,y,w,h);
  ctx.fill();
}

function drawStatusBar(title,secNum){

/* ── SCREEN TRANSITION (flash) ── */
function transitionTo(name,dir=1){
  if(name===currentScreen) return;
  currentScreen=name;
  menuIdx=Math.max(0,['home','about','work','services','reviews','contact'].indexOf(name)-1);

  // Flash white
  fill('#ffffff',0,0,SC,SH);scTex.needsUpdate=true;

  // Phone reaction tilt
  gsap.to(phoneGroup.rotation,{
    x:dir*.06,duration:.12,ease:'power2.in',
    onComplete:()=>gsap.to(phoneGroup.rotation,{x:0,duration:.5,ease:'elastic.out(1,.6)'})
  });
  gsap.to(phoneGroup.position,{
    z:.12,duration:.12,ease:'power2.in',
    onComplete:()=>gsap.to(phoneGroup.position,{z:0,duration:.5,ease:'elastic.out(1,.6)'})
  });

  setTimeout(()=>{ drawScreen(name); },80);
}

/* ═══════════════════════════════════
   NAVIGATION LOGIC
═══════════════════════════════════ */
const secOrder=['home','about','work','services','reviews','contact'];
window.navigate=function(name){ transitionTo(name); };

function doAction(action){
  switch(action){
    case 'up':
      if(currentScreen==='home'){
        menuIdx=Math.max(0,menuIdx-1);drawHome();
        // Button press anim
        gsap.to(dpMeshes[0].position,{z:.27,duration:.08,yoyo:true,repeat:1});
      } else {
        const i=secOrder.indexOf(currentScreen);
        if(i>0) transitionTo(secOrder[i-1],-1);
        gsap.to(dpMeshes[0].position,{z:.27,duration:.08,yoyo:true,repeat:1});
      }
      break;
    case 'down':
      if(currentScreen==='home'){
        menuIdx=Math.min(4,menuIdx+1);drawHome();
        gsap.to(dpMeshes[1].position,{z:.27,duration:.08,yoyo:true,repeat:1});
      } else {
        const i=secOrder.indexOf(currentScreen);
        if(i<secOrder.length-1) transitionTo(secOrder[i+1],1);
        gsap.to(dpMeshes[1].position,{z:.27,duration:.08,yoyo:true,repeat:1});
      }
      break;
    case 'ok':{
      // Press animation
      gsap.to(okBtn.position,{z:.28,duration:.08,yoyo:true,repeat:1});
      if(currentScreen==='home'){
        const screens=['about','work','services','reviews','contact'];
        transitionTo(screens[menuIdx],1);
      } else if(currentScreen==='contact'){
        window.open('https://formsubmit.co/work.oussama.lassoued@gmail.com','_blank');
      }
      break;
    }
    case 'menu':
      transitionTo('home',-1);
      softKeyMeshes[0]&&gsap.to(softKeyMeshes[0].position,{z:.27,duration:.08,yoyo:true,repeat:1});
      break;
    case 'back':{
      const i=secOrder.indexOf(currentScreen);
      if(i>0) transitionTo(secOrder[i-1],-1);
      softKeyMeshes[1]&&gsap.to(softKeyMeshes[1].position,{z:.27,duration:.08,yoyo:true,repeat:1});
      break;
    }
    default:
      if(action.startsWith('key_')){
        const k=action.replace('key_','');
        const map={'1':'about','2':'work','3':'services','4':'reviews','5':'contact','0':'home'};
        if(map[k]) transitionTo(map[k],1);
        // Press key animation
        const idx={'1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6,'8':7,'9':8,'0':10}[k];
        if(idx!==undefined&&keyMeshes[idx]){
          gsap.to(keyMeshes[idx].position,{z:.255,duration:.08,yoyo:true,repeat:1,ease:'power2.in'});
        }
      }
  }
}

/* ═══════════════════════════════════
   RAYCASTER — CLICK DETECTION
═══════════════════════════════════ */
const rc=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const btnTip=document.getElementById('btn-tip');
let hovered=null;

function getClickables(){
  return [...dpMeshes,...softKeyMeshes,...keyMeshes,okBtn];
}

canvas.style.pointerEvents='auto';
canvas.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  rc.setFromCamera(mouse,camera);
  const hits=rc.intersectObjects(getClickables());
  if(hits.length){
    const ud=hits[0].object.userData;
    if(ud.label){
      btnTip.style.left=(e.clientX+14)+'px';
      btnTip.style.top=(e.clientY-10)+'px';
      btnTip.textContent=ud.label;
      btnTip.style.opacity='1';
      document.body.classList.add('hov');
      hovered=hits[0].object;
    }
  } else {
    btnTip.style.opacity='0';
    document.body.classList.remove('hov');
    hovered=null;
  }
});

canvas.addEventListener('click',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  rc.setFromCamera(mouse,camera);
  const hits=rc.intersectObjects(getClickables());
  if(hits.length){
    const ud=hits[0].object.userData;
    if(ud.action){ doAction(ud.action); document.body.classList.add('pressing'); setTimeout(()=>document.body.classList.remove('pressing'),200); }
  }
});

addEventListener('keydown',e=>{

    '1':'key_1','2':'key_2','3':'key_3','4':'key_4','5':'key_5',

function drawBootScreen(t){
  const pct=Math.min(t/2.5,1);
  fill('#06080f',0,0,SC,SH);
  // Boot logo
  text('PORTFOLIO OS',SC/2,140,'bold 20px monospace',`rgba(200,210,240,${Math.min(t,.8)*.9})`,'center');
  text('Oussama Lassoued',SC/2,170,'bold 12px monospace',`rgba(200,210,240,${Math.min(t,.7)*.5})`,'center');
  // Progress bar
  ctx.strokeStyle=`rgba(200,210,240,${Math.min(t,.5)*.3})`;ctx.lineWidth=1;
  ctx.strokeRect(56,210,SC-112,8);
  fill(`rgba(200,210,240,${Math.min(t,.7)*.55})`,57,211,(SC-114)*pct,6);
  // Loading text
  const msgs=['Initializing...','Loading assets...','Rendering 3D...','Ready.'];
  const mi=Math.min(Math.floor(t/0.65),3);
  text(msgs[mi],SC/2,234,'8px monospace',`rgba(180,190,220,${Math.min(t,.6)*.4})`,'center');
  // Blinking cursor
  if(Math.floor(t*2)%2===0)fill(`rgba(200,210,240,.6)`,SC/2-4,246,8,2);
  // Scanlines
  for(let y=0;y<SH;y+=4)fill('rgba(0,0,0,.05)',0,y,SC,2);
  scTex.needsUpdate=true;
}

(function render(){
  requestAnimationFrame(render);
  const t=clock.getElapsedTime();
  frameCount++;

  // Boot screen
  if(!bootDone){
    drawBootScreen(t);
    if(t>2.8){bootDone=true;drawScreen('home');}
  } else if(frameCount%4===0){ // Refresh screen every 4 frames for contact cursor blink
    if(currentScreen==='contact') drawContact();
  }

  // Float animation
  phoneGroup.position.y=Math.sin(t*.45)*.06;

  // Mouse parallax
  phoneGroup.rotation.x+=(tRX-phoneGroup.rotation.x)*.04;
  phoneGroup.rotation.y+=(tRY-phoneGroup.rotation.y)*.04;

  camera.position.x+=(camX*.3-camera.position.x)*.028;
  camera.position.y+=(.3+camY*.2-camera.position.y)*.028;

  // Screen light pulse
  screenLight.intensity=.8+Math.sin(t*1.2)*.08;

  // Particle drift
  pField.rotation.y=t*.003;

  renderer.render(scene,camera);
})();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ═══════════════════════════════════
   PRELOADER
═══════════════════════════════════ */
(function(){
  const pf=document.getElementById('pf'),pn=document.getElementById('pnum'),pl=document.getElementById('plbl');
  const lbls=['Powering on...','Booting OS...','Loading assets...','Rendering 3D...','Launching!'];
  gsap.to('#pl1',{y:'0%',duration:.7,ease:'power4.out',delay:.1});
  gsap.to('#pl2',{y:'0%',duration:.7,ease:'power4.out',delay:.2});
  let n=0,li=0;
  const tick=setInterval(()=>{
    n=Math.min(n+Math.floor(Math.random()*5)+2,100);
    pf.style.width=n+'%';
    pn.textContent=String(n).padStart(3,'0');
    const ni=Math.floor(n/22);
    if(ni!==li&&ni<lbls.length){li=ni;pl.textContent=lbls[li];}
    if(n>=100){clearInterval(tick);setTimeout(enterSite,450);}
  },22);
})();

function enterSite(){
  gsap.to('#pre',{
    clipPath:'inset(0 0 100% 0)',duration:1.3,ease:'power4.inOut',
    onComplete:()=>document.getElementById('pre').style.display='none'
  });
  gsap.to('#topbar',{opacity:1,y:0,duration:.8,delay:.6});
  gsap.to('#hint',{opacity:1,delay:1.2});
}

/* ── MAGNETIC buttons in topbar ── */
document.querySelectorAll('.tb-links a').forEach(btn=>{
  btn.addEventListener('mousemove',e=>{
    const r=btn.getBoundingClientRect();
    gsap.to(btn,{x:(e.clientX-r.left-r.width/2)*.25,y:(e.clientY-r.top-r.height/2)*.25,duration:.4,ease:'power2.out'});
  });
  btn.addEventListener('mouseleave',()=>gsap.to(btn,{x:0,y:0,duration:.6,ease:'elastic.out(1,.5)'}));
  btn.addEventListener('mouseenter',()=>document.body.classList.add('hov'));
  btn.addEventListener('mouseleave',()=>document.body.classList.remove('hov'));
});
</script>
